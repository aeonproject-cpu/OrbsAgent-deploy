# ─────────────────────────────────────────────────────────────
# Nginx Configuration — Orbs Agent Landing Page
# /etc/nginx/sites-available/orbsagent.xyz
#
# Setup:
#   sudo ln -s /etc/nginx/sites-available/orbsagent.xyz \
#              /etc/nginx/sites-enabled/orbsagent.xyz
#   sudo nginx -t
#   sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=orbsagent:10m rate=30r/m;

# ── HTTP → HTTPS Redirect ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name orbsagent.xyz www.orbsagent.xyz;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main Server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name orbsagent.xyz www.orbsagent.xyz;

    # ── SSL / TLS ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/orbsagent.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orbsagent.xyz/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/orbsagent.xyz/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security Headers ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.orbsagent.xyz;" always;

    # ── Root & Index ──────────────────────────────────────────
    root /var/www/orbs-agent;
    index index.html;
    charset utf-8;

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Static Files Caching ──────────────────────────────────
    location ~* \.(css|js|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── HTML — No Cache (always fresh) ───────────────────────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Main SPA / Static Site ────────────────────────────────
    location / {
        limit_req zone=orbsagent burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # ── Robots & Sitemap ──────────────────────────────────────
    location = /robots.txt  { access_log off; log_not_found off; }
    location = /sitemap.xml { access_log off; }
    location = /favicon.ico { access_log off; log_not_found off; }

    # ── Block hidden files ────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/orbsagent-access.log;
    error_log  /var/log/nginx/orbsagent-error.log warn;
}
